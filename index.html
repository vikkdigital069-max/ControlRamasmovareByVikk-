<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Ramsmovare By vikk😈</title>
    <style>
        :root {
            --primary: #ff0000;
            --accent: #00ff00;
            --glass: rgba(0, 0, 0, 0.9);
            --tiktok: #00f2ea;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Consolas', 'Courier New', monospace;
            overflow: hidden; background: #000;
        }

        /* Video Background */
        #bg-video {
            position: fixed; right: 0; bottom: 0;
            min-width: 100%; min-height: 100%; z-index: -1;
            object-fit: cover; filter: brightness(0.35) contrast(1.1);
        }

        /* Centered Layout Wrapper */
        .wrapper {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; flex-direction: column;
            padding: 20px;
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 0, 0, 0.4);
            border-radius: 12px;
            padding: 40px;
            width: 100%; max-width: 480px;
            text-align: center; color: #fff;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.4);
            animation: panelFade 0.8s ease-out;
        }

        @keyframes panelFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { color: var(--primary); text-shadow: 0 0 15px red; margin: 0; font-size: 24px; text-transform: uppercase; }
        .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 30px; letter-spacing: 1px; }

        /* Form Inputs */
        .input-group { margin-bottom: 15px; }
        input {
            width: 100%; padding: 14px; margin: 8px 0;
            background: rgba(20, 20, 20, 0.8); border: 1px solid #333;
            color: var(--accent); text-align: center; border-radius: 6px;
            outline: none; transition: 0.3s; font-size: 14px;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(255,0,0,0.2); }

        /* Action Buttons */
        button {
            width: 100%; padding: 15px; margin-top: 10px;
            background: var(--primary); color: #fff;
            border: none; border-radius: 6px; cursor: pointer;
            font-weight: bold; transition: 0.3s; text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover { background: #b00; box-shadow: 0 0 25px rgba(255,0,0,0.5); transform: translateY(-2px); }
        button:active { transform: translateY(0); }

        /* Hacking Console Animation */
        #console-box {
            display: none; text-align: left; background: #050505;
            padding: 15px; border: 1px solid #222; height: 160px;
            overflow-y: hidden; font-size: 11px; color: var(--accent);
            margin-top: 20px; border-radius: 6px; line-height: 1.6;
        }

        /* Result Link Area */
        #result-box {
            display: none; margin-top: 20px; padding: 20px;
            background: rgba(0, 255, 0, 0.05); border: 1px solid var(--accent);
            border-radius: 6px; animation: glowPulse 2s infinite;
        }
        @keyframes glowPulse { 0% { box-shadow: 0 0 5px var(--accent); } 50% { box-shadow: 0 0 15px var(--accent); } 100% { box-shadow: 0 0 5px var(--accent); } }

        /* Social Media Footer */
        .footer-social {
            margin-top: 30px; padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .social-link {
            color: #fff; text-decoration: none; font-size: 0.85rem;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s; opacity: 0.8;
        }
        .social-link:hover { opacity: 1; color: var(--tiktok); text-shadow: 0 0 10px var(--tiktok); }

        /* Ransomware View Specifics */
        .timer-big { font-size: 4rem; color: var(--primary); margin: 25px 0; font-weight: bold; text-shadow: 0 0 20px #000; }
        .victim-msg { background: rgba(255,0,0,0.1); padding: 15px; border-radius: 5px; margin-bottom: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="bg.mp4" type="video/mp4">
    </video>

    <div class="wrapper">
        
        <div id="adminPanel" class="glass-panel">
            <h1>CONTROL RAMSMOVARE</h1>
            <p class="subtitle">By vikk😈</p>
            
            <div id="setup-form">
                <input type="text" id="targetName" placeholder="NAMA TARGET / KORBAN">
                <input type="text" id="targetPass" placeholder="PASSWORD DEKRIPSI">
                <button onclick="startProcess()">MULAI PROSES</button>
            </div>

            <div id="console-box"></div>

            <div id="result-box">
                <p style="color:var(--accent); margin:0 0 10px 0; font-weight: bold; font-size: 14px;">URL PAYLOAD READY!</p>
                <input type="text" id="finalUrl" readonly style="font-size: 11px;">
                <button onclick="copyLink()" style="background: var(--accent); color: #000; margin-top: 10px;">SALIN LINK SEKARANG</button>
            </div>

            <div class="footer-social">
                <a href="https://www.tiktok.com/@vikk.digital.store.id?_r=1&_t=ZS-94Hs3DLVPwV" target="_blank" class="social-link">
                    <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M9 0h1.98c.144.715.54 1.617 1.235 2.512C12.895 3.389 13.797 4 15 4v2c-1.753 0-3.07-.814-4-1.829V11a5 5 0 1 1-5-5v2a3 3 0 1 0 3 3V0Z"/>
                    </svg>
                    vikk.digital.store.id
                </a>
            </div>
        </div>

        <div id="ransomView" class="glass-panel" style="display:none; border-color: red;">
            <h1 style="color:red; font-size: 28px;">SYSTEM ENCRYPTED!</h1>
            <p class="subtitle">Control Ramsmovare By vikk😈</p>
            
            <div class="victim-msg">
                Halo <span id="vName" style="color:yellow; font-weight: bold;">User</span>, seluruh file penting Anda telah dienkripsi. Jangan mencoba merusak sistem atau data akan hilang selamanya.
            </div>

            <div class="timer-big" id="tmr">59:59</div>

            <input type="text" id="passIn" placeholder="ENTER DECRYPTION KEY">
            <button onclick="check()" style="background: #ff0000;">DECRYPT DATA</button>

            <div class="footer-social">
                <p style="font-size: 10px; color: #666; margin-bottom: 10px;">Secured by vikk Engine</p>
                <a href="https://www.tiktok.com/@vikk.digital.store.id?_r=1&_t=ZS-94Hs3DLVPwV" target="_blank" class="social-link">
                    Follow Dev TikTok
                </a>
            </div>
        </div>

    </div>

    <script>
        // Logika URL Parameter
        const urlParams = new URLSearchParams(window.location.search);
        const pld = urlParams.get('payload');

        // MODE: TAMPILAN TARGET
        if (pld) {
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('ransomView').style.display = 'block';
            try {
                const data = JSON.parse(atob(pld));
                document.getElementById('vName').innerText = data.n;
                
                let sec = 3599;
                setInterval(() => {
                    if(sec > 0) sec--;
                    let m = Math.floor(sec/60); let s = sec%60;
                    document.getElementById('tmr').innerText = `${m}:${s < 10 ? '0'+s : s}`;
                }, 1000);

                window.check = () => {
                    if(document.getElementById('passIn').value === data.p) {
                        alert("Access Granted. Decrypting system...");
                        document.body.innerHTML = `
                            <div style="background:#000; color:lime; height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; font-family:sans-serif;">
                                <h1 style="color:lime; text-shadow:none;">SUCCESSFULLY DECRYPTED ✅</h1>
                                <p>Seluruh file Anda telah dipulihkan.</p>
                            </div>`;
                    } else {
                        alert("KUNCI SALAH! PERCOBAAN ILEGAL TERDETEKSI.");
                    }
                }
            } catch(e) { console.error("Invalid Data"); }
        }

        // MODE: ADMIN (Hacking Animation & Generation)
        function startProcess() {
            const name = document.getElementById('targetName').value;
            const pass = document.getElementById('targetPass').value;

            if(!name || !pass) return alert("Mohon isi Nama Target dan Password!");

            document.getElementById('setup-form').style.display = 'none';
            const consoleBox = document.getElementById('console-box');
            consoleBox.style.display = 'block';

            const logs = [
                "> INITIALIZING VIKK_CONTROL_V2...",
                "> TARGET IDENTIFIED: " + name.toUpperCase(),
                "> CONNECTING TO BYPASS_SERVER...",
                "> INJECTING TROJAN PAYLOAD...",
                "> ENCRYPTING SYSTEM FILES...",
                "> GENERATING PRIVATE KEY...",
                "> SYNCING WITH VERCEL CLOUD...",
                "> BUILD SUCCESSFUL."
            ];

            let i = 0;
            const interval = setInterval(() => {
                if(i < logs.length) {
                    consoleBox.innerHTML += logs[i] + "<br>";
                    i++;
                } else {
                    clearInterval(interval);
                    setTimeout(() => showFinalResult(name, pass), 800);
                }
            }, 600);
        }

        function showFinalResult(n, p) {
            const payload = btoa(JSON.stringify({n, p}));
            const link = window.location.origin + window.location.pathname + "?payload=" + payload;
            
            document.getElementById('console-box').style.display = 'none';
            document.getElementById('result-box').style.display = 'block';
            document.getElementById('finalUrl').value = link;
        }

        function copyLink() {
            const copyText = document.getElementById("finalUrl");
            copyText.select();
            copyText.setSelectionRange(0, 99999); // Untuk mobile
            navigator.clipboard.writeText(copyText.value);
            alert("Link Payload Berhasil Disalin!");
        }
    </script>
</body>
</html>
